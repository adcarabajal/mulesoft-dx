      description: Get list of request counts. If you are using connected app, "Store Metrics Viewer" scope is needed. For query timeframes and retention refer to [OSv2 documentation](https://docs.mulesoft.com/object-store/osv2-apis#osv2-usage-limits)
      parameters:
      - name: startDate
        required: true
        in: query
        schema:
          type: string
          format: date-time
        description: The startDate query parameter.
      - name: endDate
        required: true
        in: query
        schema:
          type: string
          format: date-time
        description: The endDate query parameter.
      - name: period
        required: true
        in: query
        schema:
          type: string
          enum:
          - 1hour
          - 1day
          - 1month
        description: The period query parameter.
      - name: isMaster
        description: 'If true, provide OS usage for master org along with all underlying sub orgs. If false provide OS usage for only org provided.

          '
        required: true
        in: query
        schema:
          type: boolean
          default: false
      - $ref: '#/components/parameters/XOrigin_organizationId_Path'
      responses:
        '200':
          description: List of request counts, one per period in the queried time frame.
          x-amf-mediaType: application/json
          content:
            application/json:
              schema:
                example: &id001
                - timeStamp: 2015-12-01 00:00:00+00:00
                  objectStoreRequestCount: 0
