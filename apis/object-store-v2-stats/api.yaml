openapi: 3.0.0
info:
  title: Object Store v2 Statistics API
  version: 1.0.0
  description: Retrieve usage statistics for Object Store v2 stores, environments, and regions.
servers:
- url: https://object-store-stats.anypoint.mulesoft.com/api/v1
security:
- bearerAuth: []
- clientAuth: []
paths:
